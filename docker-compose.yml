version: '3.8'

services:
  bmw-bridge:
    # Das Image von deiner GitHub Registry laden
    image: ghcr.io/bausi2k/bmw-python-streaming-mqtt-bridge:latest
    
    container_name: bmw-bridge
    restart: unless-stopped
    
    # Lädt die Variablen aus der .env Datei
    env_file:
      - .env
    
    # Bindet die wichtigen Dateien ein
    volumes:
      - ./bmw_tokens.json:/app/bmw_tokens.json
      - ./vehicle.json:/app/vehicle.json
      - ./logs:/app/logs
      - ./.env:/app/.env
      
    # Setzt die Zeitzone für korrekte Zeitstempel im Log
    environment:
      - TZ=Europe/Vienna